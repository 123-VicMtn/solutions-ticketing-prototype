services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: ticketing-reverse-proxy
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 256m
    pids_limit: 100
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '${PORT:-3333}:8080'
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/nginx-health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing-app
    restart: unless-stopped
    cpus: 1.50
    mem_limit: 1024m
    pids_limit: 300
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DB_HOST: postgres
      SESSION_DRIVER: database
      HEALTH_CHECK_SECRET: ${HEALTH_CHECK_SECRET:?HEALTH_CHECK_SECRET is required in production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads/tickets
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3333/health/live', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

  postgres:
    image: postgres:17-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    cpus: 1.00
    mem_limit: 768m
    pids_limit: 200
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required in production}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in production}
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required in production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:?DB_USER is required in production} -d ${DB_DATABASE:?DB_DATABASE is required in production}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'

volumes:
  pgdata:
  uploads:
