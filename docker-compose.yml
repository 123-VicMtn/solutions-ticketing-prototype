services:
  app:
    image: node:24-alpine
    container_name: ticketing-app
    working_dir: /app
    ports:
      - '${PORT:-3333}:3333'
      - '5173:5173'
      - '24678:24678'
      - '9229:9229'
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      DB_HOST: postgres
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install && node --inspect=0.0.0.0:9229 ace serve --hmr"

  postgres:
    image: postgres:17-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-ticketing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ticketing}
      POSTGRES_DB: ${DB_DATABASE:-ticketing_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-ticketing} -d ${DB_DATABASE:-ticketing_dev}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  node_modules:
